name: CI - Build & Test
on:
  pull_request:
    branches:
    - '*'
    paths-ignore:
    - '**.md'
  workflow_dispatch:

jobs:
  format-and-lint:
    name: Format & Lint Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
        name: Install dependencies
      - run: npm run bootstrap
        name: Bootstrap the packages
      - run: npm run build-all
        name: Build packages
      - run: npm run format-check
        name: Check formatting
      - name: Check linter
        run: |
          npm run lint
          git diff --exit-code -- . ':!packages/k8s/tests/test-kind.yaml'

  docker-tests:
    name: Docker Hook Tests
    runs-on: ubuntu-latest
    needs: format-and-lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
        name: Install dependencies
      - run: npm run bootstrap
        name: Bootstrap the packages
      - run: npm run build-all
        name: Build packages
      - name: Run Docker tests
        run: npm run test --prefix packages/docker

  k8s-tests:
    name: Kubernetes Hook Tests
    runs-on: ubuntu-latest
    needs: format-and-lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: sed -i "s|{{PATHTOREPO}}|$(pwd)|" packages/k8s/tests/test-kind.yaml
        name: Setup kind cluster yaml config
      - uses: helm/kind-action@v1.12.0
        with:
          config: packages/k8s/tests/test-kind.yaml
      - name: Route pod IPs to Kind node
        run: |
          NODE_NAME=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}')
          NODE_IP=$(docker container inspect "${NODE_NAME}" \
            --format '{{ .NetworkSettings.Networks.kind.IPAddress }}')
          POD_CIDR=$(kubectl get node "${NODE_NAME}" -o jsonpath='{.spec.podCIDR}')
          if [ -z "${POD_CIDR}" ] || [ -z "${NODE_IP}" ]; then
            echo "ERROR: Could not determine POD_CIDR (${POD_CIDR}) or NODE_IP (${NODE_IP})"
            exit 1
          fi
          echo "Adding route: ${POD_CIDR} via ${NODE_IP}"
          sudo ip route replace "${POD_CIDR}" via "${NODE_IP}"
          ip route | grep "${POD_CIDR}"
      - run: npm install
        name: Install dependencies
      - run: npm run bootstrap
        name: Bootstrap the packages
      - run: npm run build-all
        name: Build packages
      - name: Run Kubernetes tests
        run: npm run test --prefix packages/k8s