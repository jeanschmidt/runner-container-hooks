[package]
name = "rpc-server"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
tiny_http = { version = "0.12", default-features = false }
libc = "0.2"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true

[[bin]]
name = "rpc-server"
path = "src/main.rs"
