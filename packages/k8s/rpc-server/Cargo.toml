[package]
name = "rpc-server"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
tiny_http = { version = "0.12", default-features = false }
libc = "0.2"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
# Unwind (not abort) so a panic in one request thread only unwinds that thread —
# the server keeps serving and the LockRecover/lock_state() poison recovery
# actually runs. Under panic="abort" any handler panic SIGABRTs the whole
# process (taking down an in-flight job), and the poison-recovery path is dead
# code because aborting never poisons a mutex. Costs a little binary size for
# unwind tables; correctness/resilience wins.
panic = "unwind"
strip = true

[[bin]]
name = "rpc-server"
path = "src/main.rs"
